name: Release & Publish

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      job:
        description: 'Welcher Job soll ausgeführt werden?'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - redaxo_publish
      version:
        description: 'Version (nur für redaxo_publish, z.B. v1.1.1)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    name: Build & Release ZIP
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.job == 'release')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Abhängigkeiten installieren
        working-directory: build
        run: npm ci

      - name: Assets bauen (minifizieren + Vendor-Update)
        working-directory: build
        run: npm run build:all

      - name: Release-ZIP erstellen
        run: |
          TAG=${GITHUB_REF_NAME}
          ZIP_NAME="vector_maps_${TAG}.zip"

          zip -r "$ZIP_NAME" . \
            --exclude "*.git*" \
            --exclude ".gitignore" \
            --exclude ".github/*" \
            --exclude "build/*" \
            --exclude "*.map" \
            --exclude "*.DS_Store" \
            --exclude "*.swp"

          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true

  redaxo_publish:
    name: Publish to REDAXO.org
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.job == 'redaxo_publish')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - if: hashFiles('composer.json') != ''
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - if: hashFiles('composer.json') != ''
        uses: ramsey/composer-install@v2
        with:
          composer-options: "--no-dev"
      - uses: FriendsOfREDAXO/installer-action@v1
        with:
          myredaxo-username: ${{ secrets.MYREDAXO_USERNAME }}
          myredaxo-api-key: ${{ secrets.MYREDAXO_API_KEY }}
          description: ${{ github.event.release.body }}
          version: ${{ github.event.release.tag_name || inputs.version }}
